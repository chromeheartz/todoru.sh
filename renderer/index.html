    <title>todo-terminal</title>

        <div class="dots">
          <span class="dot close" id="btn-close" title="close"></span>
          <span class="dot min" id="btn-min" title="minimize"></span>
          <span class="dot"></span>
        </div>
        <div class="title">~/todoru.sh</div>
        <div class="count" id="count">0 tasks</div>
      </header>

      <div class="console" id="log"></div>

      <footer class="prompt">
        <div class="suggest" id="suggest" hidden></div>
        <span class="caret">❯</span>

          type="text"
